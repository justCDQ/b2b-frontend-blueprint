<!doctype html>
<html lang="en" data-theme="light" data-density="comfortable">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B2B Frontend Blueprint</title>
    <link rel="stylesheet" href="../../packages/theme/src/styles.css" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">B2B Blueprint</div>
        <nav class="nav" aria-label="Demo navigation">
          <a class="nav__item nav__item--active" href="#users">User Management</a>
          <a class="nav__item" href="#imports" aria-disabled="true">Import Records</a>
          <a class="nav__item" href="#projects" aria-disabled="true">Project Settings</a>
        </nav>
      </aside>

      <div class="main">
        <header class="page-header">
          <div>
            <p class="eyebrow">Framework-agnostic demo</p>
            <h1>Users</h1>
            <p>Manage organization members, roles, and access status.</p>
          </div>
          <div class="actions">
            <label class="field field--inline">
              <span>Role</span>
              <select id="role-switch">
                <option value="owner">owner</option>
                <option value="admin">admin</option>
                <option value="operator">operator</option>
                <option value="viewer">viewer</option>
              </select>
            </label>
            <button class="button button--secondary" id="refresh-button" type="button">Refresh</button>
            <button class="button button--primary" id="theme-toggle" type="button">Switch to dark</button>
          </div>
        </header>

        <main class="content">
          <section class="filter-bar" aria-label="User filters">
            <label class="field">
              <span>Keyword</span>
              <input id="keyword-input" type="search" placeholder="Search name or email" />
            </label>
            <label class="field">
              <span>Role</span>
              <select id="role-filter">
                <option value="">All roles</option>
              </select>
            </label>
            <label class="field">
              <span>Status</span>
              <select id="status-filter">
                <option value="">All statuses</option>
              </select>
            </label>
            <div class="filter-bar__actions">
              <button class="button button--secondary" id="reset-filters" type="button">Reset</button>
            </div>
          </section>

          <section class="batch-bar" id="batch-bar" hidden>
            <span id="selection-summary">0 selected</span>
            <button class="button button--secondary" type="button" disabled>Export</button>
            <button class="button button--secondary" type="button" disabled>Disable</button>
            <button class="button button--secondary" type="button" id="clear-selection">Clear selection</button>
          </section>

          <section class="table-shell" aria-live="polite">
            <div class="table-status" id="table-status" hidden></div>
            <div class="table-scroll">
              <table class="data-table">
                <thead>
                  <tr>
                    <th class="selection-cell">
                      <input id="select-all" type="checkbox" aria-label="Select all users" />
                    </th>
                    <th>User</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Team</th>
                    <th>MFA</th>
                    <th>Last active</th>
                    <th>Created</th>
                    <th class="operation-cell">Operations</th>
                  </tr>
                </thead>
                <tbody id="users-body"></tbody>
              </table>
            </div>
            <div class="pagination" id="pagination"></div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
